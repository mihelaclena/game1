<!DOCTYPE html>
<html>
<head>
  <title>AR Tree Jumper</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="msg">YES, YOU MADE IT!</div>
    <div class="instructions">Tap the screen to jump!</div>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" position="1 2 1"></a-light>

    <a-entity id="game-world" position="0 0 -6">
      <a-sphere id="player" position="-4.5 1.2 0" radius="0.2" color="#FF8C00"></a-sphere>
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
