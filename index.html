<!DOCTYPE html>
<html>
  <head>
    <title>AR Tree Jumper</title>
    <!-- A-Frame for 3D and AR.js for Augmented Reality tracking -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        text-align: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        text-shadow: 2px 2px 4px #000;
        pointer-events: none;
      }
      #msg { 
        font-size: 32px; 
        font-weight: bold; 
        color: #00ff00; 
        display: none; 
        margin-top: 10px;
      }
      #score { font-size: 24px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; }
      .instructions { font-size: 14px; margin-top: 5px; opacity: 0.8; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- Overlay UI -->
    <div id="ui">
      <div id="score">Score: 0</div>
      <div id="msg">YES, YOU MADE IT!</div>
      <div class="instructions">Tap the screen to jump to the next tree!</div>
    </div>

    <!-- AR Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="1 2 1"></a-light>

      <!-- Game World Container -->
      <a-entity id="game-world" position="0 0 -6">
        
        <!-- The Animal (Player) -->
        <a-sphere id="player" position="-4.5 1.2 0" radius="0.2" color="#FF8C00" 
                  animation="property: position; dur: 400; easing: easeOutQuad; startEvents: jump">
        </a-sphere>

        <!-- Trees will be generated by JavaScript -->
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const world = document.getElementById('game-world');
      const player = document.getElementById('player');
      const scoreEl = document.getElementById('score');
      const msgEl = document.getElementById('msg');
      
      let currentTree = 0;
      const totalTrees = 10;
      const treeSpacing = 1;
      const startX = -4.5;

      // 1. Generate 10 Trees
      for (let i = 0; i < totalTrees; i++) {
        let tree = document.createElement('a-entity');
        let xPos = startX + (i * treeSpacing);
        tree.setAttribute('position', `${xPos} 0 0`);
        
        // Trunk
        let trunk = document.createElement('a-cylinder');
        trunk.setAttribute('radius', '0.1');
        trunk.setAttribute('height', '1');
        trunk.setAttribute('color', '#8B4513');
        
        // Leaves
        let leaves = document.createElement('a-cone');
        leaves.setAttribute('radius-bottom', '0.4');
        leaves.setAttribute('height', '0.8');
        leaves.setAttribute('position', '0 0.8 0');
        // Start tree is bright green, End tree is Gold, others are forest green
        leaves.setAttribute('color', i === 0 ? '#7CFC00' : (i === 9 ? '#FFD700' : '#2E8B57'));

        tree.appendChild(trunk);
        tree.appendChild(leaves);
        world.appendChild(tree);
      }

      // 2. Happy Sound Function (Web Audio API)
      function playHappySound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = 'sine';
        // Arpeggio effect
        const now = audioCtx.currentTime;
        oscillator.frequency.setValueAtTime(523.25, now); // C5
        oscillator.frequency.setValueAtTime(659.25, now + 0.1); // E5
        oscillator.frequency.setValueAtTime(783.99, now + 0.2); // G5
        oscillator.frequency.setValueAtTime(1046.50, now + 0.3); // C6

        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

        oscillator.start();
        oscillator.stop(now + 0.5);
      }

      // 3. Jump Logic on Click/Tap
      window.addEventListener('click', () => {
        if (currentTree < totalTrees - 1) {
          currentTree++;
          let newX = startX + (currentTree * treeSpacing);
          
          // Update position with animation
          player.setAttribute('animation', `property: position; to: ${newX} 1.2 0; dur: 400`);
          player.emit('jump');

          // 4. Win Condition (10th Tree)
          if (currentTree === totalTrees - 1) {
            scoreEl.innerText = "Score: 20";
            msgEl.style.display = "block";
            playHappySound();
          }
        }
      });
    </script>
  </body>
</html>
